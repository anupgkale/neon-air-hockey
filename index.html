<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Ojas Kale's - Arcade Neon Air Hockey</title>
    <!-- Dynamic Favicon Placeholder Link -->
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d13;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Game Container Layout */
        #game-container {
            position: relative;
            width: 500px;
            height: 750px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            border-radius: 10px;
        }

        canvas {
            background-color: #14151f;
            border-radius: 10px;
            display: block;
        }

        /* Overlay Screens (Menu & Game Over) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 11, 18, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border-radius: 10px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* Typography & Glowing Text */
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f2fe;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff007f;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
        }

        /* Instruction Cards */
        .instructions-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
            width: 100%;
        }

        .instructions-panel h3 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .instructions-panel p {
            font-size: 0.9rem;
            color: #cccccc;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        /* Buttons & Custom Selectors */
        .menu-btn {
            background: transparent;
            border: 2px solid #00f2fe;
            color: #00f2fe;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 15px;
            width: 80%;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .menu-btn:hover {
            background: #00f2fe;
            color: #0d0d13;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }

        .menu-btn.secondary {
            border-color: #ff007f;
            color: #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.1);
        }

        .menu-btn.secondary:hover {
            background: #ff007f;
            color: #0d0d13;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
        }

        .difficulty-container {
            width: 80%;
            margin-bottom: 25px;
            text-align: center;
        }

        .difficulty-label {
            display: block;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .difficulty-selector {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .diff-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #fff;
            padding: 8px 0;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .diff-btn:hover {
            background: rgba(0, 242, 254, 0.2);
        }

        .diff-btn.active {
            background: #00f2fe;
            color: #0d0d13;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            border-color: #00f2fe;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Canvas Viewport -->
        <canvas id="gameCanvas" width="500" height="750"></canvas>

        <!-- Main Menu Overlay -->
        <div id="main-menu" class="overlay">
            <h3>Welcome to Ojas Kale's</h3>
            <h1>Neon Air Hockey</h1>
            <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">Local Table Battle</p>
            
            <div class="instructions-panel">
                <h3>Game Controls</h3>
                <p style="color: #00f2fe; font-weight: bold; margin-bottom: 10px;">⚡ 1-Player Mode: Move your MOUSE to control the bottom mallet!</p>
                <p><strong>2-Player Local Mode:</strong></p>
                <p>• Player 1 (Bottom): Arrow Keys</p>
                <p>• Player 2 (Top): W, A, S, D Keys</p>
            </div>

            <div class="difficulty-container">
                <span class="difficulty-label">AI Difficulty Level</span>
                <div class="difficulty-selector">
                    <button class="diff-btn" data-level="1">1</button>
                    <button class="diff-btn" data-level="2">2</button>
                    <button class="diff-btn active" data-level="3">3</button>
                    <button class="diff-btn" data-level="4">4</button>
                    <button class="diff-btn" data-level="5">5</button>
                </div>
            </div>

            <button class="menu-btn" id="btn-1p">1 Player (Use Mouse)</button>
            <button class="menu-btn secondary" id="btn-2p">2 Players (Keyboard)</button>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over" class="overlay hidden">
            <h1 id="winner-title">PLAYER 1 WINS</h1>
            <h2 id="final-score">7 - 4</h2>
            <button class="menu-btn" id="btn-rematch">Play Another Round?</button>
        </div>
    </div>

    <script>
        // --- DYNAMIC FAVICON GENERATOR ---
        function generateFavicon() {
            const favCanvas = document.createElement('canvas');
            favCanvas.width = 32; favCanvas.height = 32;
            const fctx = favCanvas.getContext('2d');
            fctx.fillStyle = '#14151f'; fctx.beginPath(); fctx.roundRect(0, 0, 32, 32, 6); fctx.fill();
            fctx.strokeStyle = 'rgba(255, 0, 127, 0.4)'; fctx.lineWidth = 2; fctx.beginPath(); fctx.moveTo(0, 16); fctx.lineTo(32, 16); fctx.stroke();
            fctx.save(); fctx.shadowBlur = 4; fctx.shadowColor = '#00f2fe'; fctx.strokeStyle = '#00f2fe'; fctx.lineWidth = 2; fctx.fillStyle = '#1c1d2a'; fctx.beginPath(); fctx.arc(16, 16, 8, 0, Math.PI * 2); fctx.fill(); fctx.stroke();
            fctx.fillStyle = '#00f2fe'; fctx.beginPath(); fctx.arc(16, 16, 3, 0, Math.PI * 2); fctx.fill(); fctx.restore();
            document.getElementById('dynamic-favicon').href = favCanvas.toDataURL('image/png');
        }
        generateFavicon();

        // --- GAME CONFIGURATION & SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'MENU'; 
        let gameMode = '1P';     
        let aiDifficulty = 3;   
        let player1Score = 0;
        let player2Score = 0;
        const WINNING_SCORE = 7;

        const rinkPadding = 20; 
        const goalWidth = 160;
        const goalYOffset = 4;

        // Mouse Coordinate Captures
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height - 80;

        // --- AUDIO SYNTHESIS ENGINE ---
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSoundWall() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }

        function playSoundMallet() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function playSoundGoal() {
            if (!audioCtx) return;
            let now = audioCtx.currentTime; const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99];
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; osc.frequency.setValueAtTime(freq, now + index * 0.06);
                gain.gain.setValueAtTime(0.2, now + index * 0.06); gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.06 + 0.1);
                osc.start(now + index * 0.06); osc.stop(now + index * 0.06 + 0.1);
            });
        }

        // --- PARTICLE SYSTEM ---
        let particles = [];
        function spawnGoalExplosion(x, y, color) {
            for (let i = 0; i < 35; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, radius: Math.random() * 3 + 1, alpha: 1, decay: Math.random() * 0.02 + 0.015, color: color });
            }
        }
        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        // --- ENTITY CLASSES ---
        class Mallet {
            constructor(x, y, radius, color, isTop) {
                this.startX = x; this.startY = y; this.x = x; this.y = y; this.vx = 0; this.vy = 0;
                this.radius = radius; this.color = color; this.isTop = isTop; this.speed = 7;
            }

            reset() { this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0; }

            update(targetVX, targetVY) {
                this.vx = targetVX; this.vy = targetVY;
                this.x += this.vx; this.y += this.vy;
                this.clampBoundaries();
            }

            // Move mallet directly to a coordinate (Used for Mouse Tracking)
            moveTo(targetX, targetY) {
                // Velocity is calculated as the difference between where it was and where it is going
                this.vx = targetX - this.x;
                this.vy = targetY - this.y;
                this.x = targetX;
                this.y = targetY;
                this.clampBoundaries();
            }

            clampBoundaries() {
                const leftWall = rinkPadding + this.radius;
                const rightWall = canvas.width - rinkPadding - this.radius;
                if (this.x < leftWall) { this.x = leftWall; this.vx = 0; }
                if (this.x > rightWall) { this.x = rightWall; this.vx = 0; }

                if (this.isTop) {
                    const topWall = rinkPadding + this.radius;
                    const middleDivider = canvas.height / 2 - this.radius;
                    if (this.y < topWall) { this.y = topWall; this.vy = 0; }
                    if (this.y > middleDivider) { this.y = middleDivider; this.vy = 0; }
                } else {
                    const middleDivider = canvas.height / 2 + this.radius;
                    const bottomWall = canvas.height - rinkPadding - this.radius;
                    if (this.y < middleDivider) { this.y = middleDivider; this.vy = 0; }
                    if (this.y > bottomWall) { this.y = bottomWall; this.vy = 0; }
                }
            }

            draw() {
                ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 5; ctx.fillStyle = "#1c1d2a";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        class Puck {
            constructor(x, y, radius, color) {
                this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.radius = radius; this.color = color; this.friction = 0.992; this.maxSpeed = 15;
            }

            reset(direction) { this.x = canvas.width / 2; this.y = canvas.height / 2; this.vx = 0; this.vy = direction * 3; }

            update() {
                if (isNaN(this.x) || isNaN(this.y) || isNaN(this.vx) || isNaN(this.vy) || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset(Math.random() > 0.5 ? 1 : -1); return;
                }

                this.vx *= this.friction; this.vy *= this.friction;
                let currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (currentSpeed > this.maxSpeed) { this.vx = (this.vx / currentSpeed) * this.maxSpeed; this.vy = (this.vy / currentSpeed) * this.maxSpeed; }

                this.x += this.vx; this.y += this.vy;
                const leftWall = rinkPadding + this.radius; const rightWall = canvas.width - rinkPadding - this.radius;
                const topWall = rinkPadding + this.radius; const bottomWall = canvas.height - rinkPadding - this.radius;

                if (this.x < leftWall) { this.x = leftWall; this.vx *= -1; playSoundWall(); }
                else if (this.x > rightWall) { this.x = rightWall; this.vx *= -1; playSoundWall(); }

                const goalLeftX = canvas.width / 2 - goalWidth / 2; const goalRightX = canvas.width / 2 + goalWidth / 2;

                if (this.y < topWall) {
                    if (this.x >= goalLeftX && this.x <= goalRightX) {
                        if (this.y < rinkPadding) {
                            player1Score++; playSoundGoal(); spawnGoalExplosion(this.x, this.y, '#00f2fe');
                            if (checkGameOver()) return; this.reset(-1); player1.reset(); player2.reset();
                        }
                    } else { this.y = topWall; this.vy *= -1; playSoundWall(); }
                } else if (this.y > bottomWall) {
                    if (this.x >= goalLeftX && this.x <= goalRightX) {
                        if (this.y > canvas.height - rinkPadding) {
                            player2Score++; playSoundGoal(); spawnGoalExplosion(this.x, this.y, '#ff007f');
                            if (checkGameOver()) return; this.reset(1); player1.reset(); player2.reset();
                        }
                    } else { this.y = bottomWall; this.vy *= -1; playSoundWall(); }
                }
            }

            draw() { ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = this.color; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        const player1 = new Mallet(canvas.width / 2, canvas.height - 80, 22, '#00f2fe', false);
        const player2 = new Mallet(canvas.width / 2, 80, 22, '#ff007f', true);
        const puck = new Puck(canvas.width / 2, canvas.height / 2, 14, '#fff');

        // --- LISTENER LISTENERS REGISTER ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            initAudio(); keys[e.key] = true;
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key) && gameState === 'PLAYING') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // Mouse Motion Tracking Listener
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Calculate exact mouse position relative to canvas coordinate space dimensions
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // --- AI LOGIC ENGINE ---
        const aiProfiles = {
            1: { maxSpeed: 2.2, trackingError: 0.28, delayChance: 0.15 },
            2: { maxSpeed: 3.5, trackingError: 0.18, delayChance: 0.10 },
            3: { maxSpeed: 4.8, trackingError: 0.10, delayChance: 0.05 },
            4: { maxSpeed: 6.5, trackingError: 0.04, delayChance: 0.01 },
            5: { maxSpeed: 9.0, trackingError: 0.00, delayChance: 0.00 }
        };

        let lastAIX = player2.x; let lastAIY = player2.y; let stuckFramesCounter = 0; let isAIStuckBackingOff = false; let backOffTimer = 0;

        function calculateAILogic() {
            const profile = aiProfiles[aiDifficulty];
            if (Math.random() < profile.delayChance) return { vx: player2.vx, vy: player2.vy };

            let distMoved = Math.sqrt(Math.pow(player2.x - lastAIX, 2) + Math.pow(player2.y - lastAIY, 2));
            lastAIX = player2.x; lastAIY = player2.y;

            if (puck.y < 120 && (puck.x < 60 || puck.x > canvas.width - 60)) {
                if (distMoved < 0.3) stuckFramesCounter++;
            } else { stuckFramesCounter = Math.max(0, stuckFramesCounter - 1); }

            if (stuckFramesCounter > 45 && !isAIStuckBackingOff) { isAIStuckBackingOff = true; backOffTimer = 40; }

            if (isAIStuckBackingOff) {
                backOffTimer--; if (backOffTimer <= 0) { isAIStuckBackingOff = false; stuckFramesCounter = 0; }
                let dx = (canvas.width / 2) - player2.x; let dy = 120 - player2.y; let distance = Math.sqrt(dx * dx + dy * dy);
                return { vx: (dx / distance) * (profile.maxSpeed * 0.8), vy: (dy / distance) * (profile.maxSpeed * 0.8) };
            }

            let targetX = canvas.width / 2; let targetY = 100;
            if (puck.y < canvas.height / 2 || puck.vy < 0) {
                let noise = (Math.random() - 0.5) * 120 * profile.trackingError;
                targetX = puck.x + noise; targetY = puck.y - (puck.radius * 0.5);
            } else { targetX = canvas.width / 2; targetY = 100; }

            let dx = targetX - player2.x; let dy = targetY - player2.y; let distance = Math.sqrt(dx * dx + dy * dy);
            let vx = 0; let vy = 0;
            if (distance > 5) {
                let speedToUse = Math.min(profile.maxSpeed, distance * 0.2);
                vx = (dx / distance) * speedToUse; vy = (dy / distance) * speedToUse;
            }
            return { vx, vy };
        }

        // --- COLLISION REGISTRATION ---
        function handleMalletPuckCollision(mallet) {
            let dx = puck.x - mallet.x; let dy = puck.y - mallet.y;
            let distance = Math.sqrt(dx * dx + dy * dy); let minDist = mallet.radius + puck.radius;

            if (distance < minDist) {
                let overlap = minDist - distance;
                let nx = dx / distance; let ny = dy / distance; 
                puck.x += nx * overlap; puck.y += ny * overlap;

                let relativeVx = puck.vx - mallet.vx; let relativeVy = puck.vy - mallet.vy;
                let speedAlongNormal = relativeVx * nx + relativeVy * ny;

                if (speedAlongNormal < 0) {
                    const restitution = 1.1; let impulseScalar = -(1 + restitution) * speedAlongNormal;
                    puck.vx += nx * impulseScalar; puck.vy += ny * impulseScalar;
                    puck.vx += mallet.vx * 0.4; puck.vy += mallet.vy * 0.4;
                    playSoundMallet();
                }
            }
        }

        // --- GAME SYSTEM CONTROL ---
        function checkGameOver() {
            if (player1Score >= WINNING_SCORE || player2Score >= WINNING_SCORE) {
                gameState = 'GAMEOVER'; document.getElementById('game-over').classList.remove('hidden');
                const winnerText = player1Score >= WINNING_SCORE ? "PLAYER 1 WINS" : (gameMode === '1P' ? "COMPUTER WINS" : "PLAYER 2 WINS");
                document.getElementById('winner-title').innerText = winnerText;
                document.getElementById('winner-title').style.color = player1Score >= WINNING_SCORE ? '#00f2fe' : '#ff007f';
                document.getElementById('final-score').innerText = `${player1Score} - ${player2Score}`;
                return true;
            }
            return false;
        }

        function resetGameSession() {
            player1Score = 0; player2Score = 0; particles = []; stuckFramesCounter = 0; isAIStuckBackingOff = false;
            player1.reset(); player2.reset(); puck.reset(Math.random() > 0.5 ? 1 : -1);
        }

        function drawRink() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 4; ctx.strokeRect(rinkPadding, rinkPadding, canvas.width - rinkPadding*2, canvas.height - rinkPadding*2);
            ctx.save(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.lineWidth = 3; ctx.setLineDash([8, 8]); ctx.beginPath(); ctx.moveTo(rinkPadding, canvas.height / 2); ctx.lineTo(canvas.width - rinkPadding, canvas.height / 2); ctx.stroke(); ctx.restore();
            ctx.save(); ctx.strokeStyle = 'rgba(0, 242, 254, 0.2)'; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#00f2fe'; ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 70, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = 'rgba(0, 242, 254, 0.3)'; ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 8, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            ctx.save(); ctx.lineWidth = 6; const goalLeft = canvas.width / 2 - goalWidth / 2;
            ctx.strokeStyle = '#ff007f'; ctx.shadowBlur = 12; ctx.shadowColor = '#ff007f'; ctx.beginPath(); ctx.moveTo(goalLeft, rinkPadding); ctx.lineTo(goalLeft + goalWidth, rinkPadding); ctx.stroke(); ctx.fillStyle = '#0a050c'; ctx.fillRect(goalLeft, rinkPadding - goalYOffset, goalWidth, goalYOffset);
            ctx.strokeStyle = '#00f2fe'; ctx.shadowBlur = 12; ctx.shadowColor = '#00f2fe'; ctx.beginPath(); ctx.moveTo(goalLeft, canvas.height - rinkPadding); ctx.lineTo(goalLeft + goalWidth, canvas.height - rinkPadding); ctx.stroke(); ctx.fillStyle = '#050c0f'; ctx.fillRect(goalLeft, canvas.height - rinkPadding, goalWidth, goalYOffset); ctx.restore();
            ctx.save(); ctx.font = "900 64px 'Segoe UI', Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillStyle = "rgba(255, 0, 127, 0.12)"; ctx.fillText(player2Score, canvas.width / 2, canvas.height / 4);
            ctx.fillStyle = "rgba(0, 242, 254, 0.12)"; ctx.fillText(player1Score, canvas.width / 2, (canvas.height / 4) * 3); ctx.restore();
        }

        // --- PROCESS TICK LOOP ---
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRink();

            if (gameState === 'PLAYING') {
                // --- PLAYER 1 CONTROL SWITCH LOGIC ---
                if (gameMode === '1P') {
                    // Smooth tracking using Mouse Input
                    player1.moveTo(mouseX, mouseY);
                } else {
                    // Standard tracking using Keyboard Arrow Inputs
                    let p1VX = 0; let p1VY = 0;
                    if (keys['ArrowUp'])    p1VY = -player1.speed;
                    if (keys['ArrowDown'])  p1VY = player1.speed;
                    if (keys['ArrowLeft'])  p1VX = -player1.speed;
                    if (keys['ArrowRight']) p1VX = player1.speed;
                    player1.update(p1VX, p1VY);
                }

                // --- PLAYER 2 CONTROL SWITCH LOGIC ---
                let p2VX = 0; let p2VY = 0;
                if (gameMode === '2P') {
                    if (keys['w'] || keys['W']) p2VY = -player2.speed;
                    if (keys['s'] || keys['S']) p2VY = player2.speed;
                    if (keys['a'] || keys['A']) p2VX = -player2.speed;
                    if (keys['d'] || keys['D']) p2VX = player2.speed;
                } else {
                    let aiMove = calculateAILogic();
                    p2VX = aiMove.vx; p2VY = aiMove.vy;
                }
                player2.update(p2VX, p2VY);

                puck.update();
                handleMalletPuckCollision(player1);
                handleMalletPuckCollision(player2);
            }

            player1.draw(); player2.draw();
            if (gameState !== 'GAMEOVER') puck.draw();
            updateAndDrawParticles();
            requestAnimationFrame(gameLoop);
        }

        // --- UI MENUS ---
        const mainMenu = document.getElementById('main-menu');
        const gameOverMenu = document.getElementById('game-over');
        const diffButtons = document.querySelectorAll('.diff-btn');

        diffButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                diffButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                aiDifficulty = parseInt(e.target.getAttribute('data-level'));
            });
        });

        document.getElementById('btn-1p').addEventListener('click', () => {
            initAudio(); gameMode = '1P'; mainMenu.classList.add('hidden'); resetGameSession(); gameState = 'PLAYING';
        });
        document.getElementById('btn-2p').addEventListener('click', () => {
            initAudio(); gameMode = '2P'; mainMenu.classList.add('hidden'); resetGameSession(); gameState = 'PLAYING';
        });
        document.getElementById('btn-rematch').addEventListener('click', () => {
            gameOverMenu.classList.add('hidden'); mainMenu.classList.remove('hidden'); gameState = 'MENU';
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
